# Local rustdoc flags. Mirrors the `[package.metadata.docs.rs]` entry in
# `Cargo.toml` so that running `cargo doc` from the repo root produces docs
# with KaTeX math rendering — matching what docs.rs will publish.
#
# The path is resolved relative to the directory `cargo` is invoked from;
# always run `cargo doc` from the repo root for these flags to find the
# header file.

[build]
rustdocflags = ["--html-in-header", "katex-header.html"]
