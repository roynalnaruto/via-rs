        <div id="root"></div>

        <script type="text/babel">
            const { useState } = React;

            // ‚îÄ‚îÄ‚îÄ Palette ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            const C = {
                bg: "#ffffff",
                bgAlt: "#f8f9fb",
                bgTint: "#f2f5f9",
                border: "#d4dce8",
                client: "#1d4ed8",
                clientBg: "#eff6ff",
                server: "#15803d",
                serverBg: "#f0fdf4",
                crypto: "#b45309",
                cryptoBg: "#fffbeb",
                state: "#6d28d9",
                stateBg: "#f5f3ff",
                msg: "#0e7490",
                msgBg: "#ecfeff",
                neutral: "#374151",
                dim: "#9ca3af",
                dimMid: "#6b7280",
                black: "#111827",
                grid: "#e9eef5",
            };
            const FONT = "'IBM Plex Mono','Fira Code',monospace";
            const SANS =
                "'IBM Plex Sans','Segoe UI',-apple-system,sans-serif";
            const css = `
              @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
              #root *{box-sizing:border-box;}
              .tab-btn{cursor:pointer;border:none;background:none;font-family:${SANS};transition:all .15s;}
              .tab-btn:hover{background:#f0f4ff;}
              .node-g{cursor:default;}
              .node-g:hover .node-rect{filter:brightness(0.97);}
              .dm-card{border:1px solid ${C.border};border-radius:8px;overflow:hidden;}
              .dm-card table{border-collapse:collapse;width:100%;}
              .dm-card th,.dm-card td{padding:6px 11px;text-align:left;border-top:1px solid ${C.border};font-size:11px;font-family:${FONT};}
              .dm-card td{color:${C.neutral};}
              .dm-card td.k{color:${C.black};white-space:nowrap;}
            `;

            const TABS = [
                "‚ëÝ Architecture",
                "‚ë° Primitive stack",
                "‚ë¢ Setup (offline)",
                "‚ë£ Query ‚Üí Answer",
                "‚ë§ Data model",
            ];

            // ‚îÄ‚îÄ‚îÄ shared SVG helpers ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            function Grid({ w, h, step = 24 }) {
                const L = [];
                for (let i = 0; i <= h / step; i++)
                    L.push(
                        <line
                            key={"h" + i}
                            x1={0}
                            y1={i * step}
                            x2={w}
                            y2={i * step}
                            stroke={C.grid}
                            strokeWidth={0.5}
                        />,
                    );
                for (let i = 0; i <= w / step; i++)
                    L.push(
                        <line
                            key={"v" + i}
                            x1={i * step}
                            y1={0}
                            x2={i * step}
                            y2={h}
                            stroke={C.grid}
                            strokeWidth={0.5}
                        />,
                    );
                return <g>{L}</g>;
            }
            function ArrowMarker({ id, color }) {
                return (
                    <marker
                        id={id}
                        markerWidth={8}
                        markerHeight={8}
                        refX={7}
                        refY={4}
                        orient="auto"
                    >
                        <polygon points="0 1, 8 4, 0 7" fill={color} />
                    </marker>
                );
            }

            // ‚îÄ‚îÄ‚îÄ generic node+edge diagram with hover detail ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            function FlowDiagram({ W, H, zones, nodes, edges, legend, note }) {
                const [hov, setHov] = useState(null);
                const map = Object.fromEntries(nodes.map((n) => [n.id, n]));
                const ctr = (id) => {
                    const n = map[id];
                    return { x: n.x + n.w / 2, y: n.y + n.h / 2 };
                };
                function pts(e) {
                    const a = map[e.from],
                        b = map[e.to];
                    const ac = ctr(e.from),
                        bc = ctr(e.to);
                    const dx = bc.x - ac.x,
                        dy = bc.y - ac.y;
                    const len = Math.hypot(dx, dy) || 1;
                    const nx = dx / len,
                        ny = dy / len;
                    return {
                        x1: ac.x + (nx * a.w) / 2,
                        y1: ac.y + (ny * a.h) / 2,
                        x2: bc.x - (nx * b.w) / 2,
                        y2: bc.y - (ny * b.h) / 2,
                    };
                }
                return (
                    <div style={{ position: "relative", fontFamily: FONT }}>
                        {(zones || []).map((z, i) => (
                            <div
                                key={i}
                                style={{
                                    position: "absolute",
                                    left: z.x,
                                    top: z.y,
                                    color: z.color,
                                    fontSize: 9,
                                    fontWeight: 700,
                                    letterSpacing: 1.4,
                                    width: z.w || 190,
                                    borderBottom: `1px solid ${z.color}30`,
                                    paddingBottom: 2,
                                }}
                            >
                                {z.label}
                            </div>
                        ))}
                        <svg width={W} height={H} style={{ display: "block", maxWidth: "100%" }}>
                            <Grid w={W} h={H} />
                            <defs>
                                {edges.map((e, i) => (
                                    <ArrowMarker
                                        key={i}
                                        id={"ar" + i}
                                        color={e.color}
                                    />
                                ))}
                            </defs>
                            {(zones || []).map(
                                (z, i) =>
                                    z.box && (
                                        <rect
                                            key={i}
                                            x={z.box.x}
                                            y={z.box.y}
                                            width={z.box.w}
                                            height={z.box.h}
                                            rx={5}
                                            fill="none"
                                            stroke={z.color}
                                            strokeWidth={1}
                                            strokeDasharray="6 3"
                                            opacity={0.3}
                                        />
                                    ),
                            )}
                            {edges.map((e, i) => {
                                const { x1, y1, x2, y2 } = pts(e);
                                const mx = (x1 + x2) / 2,
                                    my = (y1 + y2) / 2;
                                const on = hov === e.from || hov === e.to;
                                const dash =
                                    e.style === "dot"
                                        ? "2 4"
                                        : e.style === "dash"
                                          ? "7 3"
                                          : "none";
                                return (
                                    <g key={i}>
                                        <line
                                            x1={x1}
                                            y1={y1}
                                            x2={x2}
                                            y2={y2}
                                            stroke={e.color}
                                            strokeWidth={on ? 2.2 : 1.2}
                                            strokeDasharray={dash}
                                            markerEnd={`url(#ar${i})`}
                                            opacity={on ? 1 : 0.5}
                                        />
                                        {e.label && (
                                            <text
                                                x={mx}
                                                y={my - 3}
                                                fill={e.color}
                                                fontSize={8}
                                                textAnchor="middle"
                                                fontFamily={FONT}
                                                opacity={on ? 1 : 0.62}
                                            >
                                                {e.label}
                                            </text>
                                        )}
                                    </g>
                                );
                            })}
                            {nodes.map((n) => {
                                const on = hov === n.id;
                                return (
                                    <g
                                        key={n.id}
                                        className="node-g"
                                        onMouseEnter={() => setHov(n.id)}
                                        onMouseLeave={() => setHov(null)}
                                    >
                                        <rect
                                            className="node-rect"
                                            x={n.x}
                                            y={n.y}
                                            width={n.w}
                                            height={n.h}
                                            rx={5}
                                            fill={n.bg}
                                            stroke={on ? n.color : C.border}
                                            strokeWidth={on ? 2 : 1}
                                            style={{
                                                filter: on
                                                    ? `drop-shadow(0 2px 8px ${n.color}33)`
                                                    : "none",
                                            }}
                                        />
                                        <rect
                                            x={n.x}
                                            y={n.y}
                                            width={n.w}
                                            height={17}
                                            rx={5}
                                            fill={n.color + "14"}
                                        />
                                        <text
                                            x={n.x + n.w / 2}
                                            y={n.y + 12}
                                            fill={n.color}
                                            fontSize={9.5}
                                            fontWeight={700}
                                            textAnchor="middle"
                                            fontFamily={FONT}
                                        >
                                            {n.label}
                                        </text>
                                        {n.sub && (
                                            <text
                                                x={n.x + n.w / 2}
                                                y={n.y + 30}
                                                fill={C.dimMid}
                                                fontSize={8}
                                                textAnchor="middle"
                                                fontFamily={FONT}
                                            >
                                                {n.sub}
                                            </text>
                                        )}
                                        {n.h >= 44 && (
                                            <text
                                                x={n.x + n.w / 2}
                                                y={n.y + (n.sub ? 42 : 34)}
                                                fill={n.color}
                                                fontSize={7.5}
                                                textAnchor="middle"
                                                fontFamily={FONT}
                                                opacity={0.75}
                                            >
                                                hover ‚ìò
                                            </text>
                                        )}
                                    </g>
                                );
                            })}
                        </svg>
                        {hov &&
                            map[hov] &&
                            map[hov].info &&
                            (() => {
                                const n = map[hov];
                                const tipX = n.x + n.w + 14;
                                return (
                                    <div
                                        style={{
                                            position: "absolute",
                                            left:
                                                tipX > W - 250
                                                    ? Math.max(8, n.x - 252)
                                                    : tipX,
                                            top: Math.min(n.y, H - 150),
                                            background: C.bg,
                                            border: `1.5px solid ${n.color}55`,
                                            borderRadius: 7,
                                            padding: "10px 13px",
                                            width: 244,
                                            boxShadow:
                                                "0 6px 20px rgba(0,0,0,0.13)",
                                            zIndex: 30,
                                            fontFamily: FONT,
                                        }}
                                    >
                                        <div
                                            style={{
                                                color: n.color,
                                                fontSize: 11,
                                                fontWeight: 700,
                                                marginBottom: 5,
                                            }}
                                        >
                                            {n.label}
                                        </div>
                                        {n.info.map((m, i) => (
                                            <div
                                                key={i}
                                                style={{
                                                    color: C.neutral,
                                                    fontSize: 9.5,
                                                    lineHeight: 1.55,
                                                    borderLeft: `2px solid ${n.color}33`,
                                                    paddingLeft: 8,
                                                    marginBottom: 3,
                                                }}
                                            >
                                                {m}
                                            </div>
                                        ))}
                                    </div>
                                );
                            })()}
                        {legend && (
                            <div
                                style={{
                                    display: "flex",
                                    flexWrap: "wrap",
                                    gap: 18,
                                    marginTop: 10,
                                    paddingLeft: 4,
                                    fontFamily: FONT,
                                }}
                            >
                                {legend.map((l, i) => (
                                    <div
                                        key={i}
                                        style={{
                                            display: "flex",
                                            alignItems: "center",
                                            gap: 6,
                                        }}
                                    >
                                        <svg width={26} height={10}>
                                            <defs>
                                                <ArrowMarker
                                                    id={"lg" + i}
                                                    color={l.color}
                                                />
                                            </defs>
                                            <line
                                                x1={2}
                                                y1={5}
                                                x2={20}
                                                y2={5}
                                                stroke={l.color}
                                                strokeWidth={1.6}
                                                strokeDasharray={l.dash || "none"}
                                                markerEnd={`url(#lg${i})`}
                                            />
                                        </svg>
                                        <span
                                            style={{
                                                color: C.dimMid,
                                                fontSize: 9,
                                            }}
                                        >
                                            {l.label}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        )}
                        {note && (
                            <p
                                style={{
                                    fontFamily: SANS,
                                    fontSize: 12,
                                    color: C.dimMid,
                                    marginTop: 12,
                                    maxWidth: 760,
                                    lineHeight: 1.5,
                                }}
                            >
                                {note}
                            </p>
                        )}
                    </div>
                );
            }

            // small helper: stack items down a column
            function col(items, x, w, y0, h, gap) {
                return items.map((it, i) => ({
                    ...it,
                    x,
                    w,
                    h,
                    y: y0 + i * (h + gap),
                }));
            }

            // ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê ‚ëÝ ARCHITECTURE ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
            function TabArch() {
                const clientBoxes = col(
                    [
                        {
                            id: "idx",
                            label: "Index decomposition",
                            sub: "i ‚Üí Œ±,Œ≤,Œ≥",
                            color: C.client,
                            bg: C.clientBg,
                            info: [
                                "i = Œ≥¬∑IJ + Œ±¬∑J + Œ≤  ‚Üí  (row Œ±, col Œ≤, slot Œ≥)",
                                "public, noiseless; never transmitted",
                            ],
                        },
                        {
                            id: "qenc",
                            label: "Query encoder",
                            sub: "encrypt the bits",
                            color: C.client,
                            bg: C.clientBg,
                            info: [
                                "(Œ±,Œ≤,Œ≥) ‚Üí { LWE@q1(bit) }  (‚âà ‚Ñì¬∑log N elts)",
                                "where privacy lives ‚Äî semantic security hides i",
                            ],
                        },
                        {
                            id: "kgen",
                            label: "Key generator",
                            sub: "offline pp",
                            color: C.client,
                            bg: C.clientBg,
                            info: [
                                "s ‚Üí pp = { cascade keys, ring-switch key, RLWE‚ÜíRGSW key }",
                                "key-dependent (encodes s, s¬≤) ‚áí circular/KDM assumption",
                            ],
                        },
                        {
                            id: "rec",
                            label: "Recover / decode",
                            sub: "decrypt-and-round",
                            color: C.client,
                            bg: C.clientBg,
                            info: [
                                "Answer ‚Üí X[i] = round((p/q4)(body ‚àí mask¬∑s2)) mod p",
                                "VIA-B: also deinterleave T records",
                            ],
                        },
                    ],
                    24,
                    156,
                    78,
                    50,
                    18,
                );
                const cryptoBoxes = col(
                    [
                        {
                            id: "rlwe",
                            label: "RLWE / MLWE",
                            sub: "base ciphertext",
                            color: C.crypto,
                            bg: C.cryptoBg,
                            info: [
                                "Enc(s,m) = (a, a¬∑s + e + Œîm),  Œî = q/p",
                                "semantic security ‚â° RLWE/MLWE hardness",
                            ],
                        },
                        {
                            id: "ext",
                            label: "External product ‚ä°",
                            sub: "the one multiply",
                            color: C.crypto,
                            bg: C.cryptoBg,
                            info: [
                                "RGSW(Œº) ‚ä° RLWE(m) ‚Üí RLWE(Œº¬∑m)",
                                "additive noise ‚Äî why depth stays in budget",
                                "needs gadget decomposition + RLev/RGSW",
                            ],
                        },
                        {
                            id: "gates",
                            label: "Gates",
                            sub: "DMux ¬∑ CMux ¬∑ CRot",
                            color: C.crypto,
                            bg: C.cryptoBg,
                            info: [
                                "DMux: route by encrypted bit (‚Üí one-hot)",
                                "CMux: select by encrypted bit",
                                "CRot: rotate by encrypted amount",
                                "all built from the external product",
                            ],
                        },
                        {
                            id: "sw",
                            label: "Switching",
                            sub: "key ¬∑ mod ¬∑ ring",
                            color: C.crypto,
                            bg: C.cryptoBg,
                            info: [
                                "key-switch: change secret key",
                                "mod-switch: q ‚Üí q' (scales noise down)",
                                "ring-switch: R(n1) ‚Üí R(n2)",
                            ],
                        },
                        {
                            id: "conv",
                            label: "Conversion",
                            sub: "LWE‚ÜíRLWE ¬∑ RLWE‚ÜíRGSW",
                            color: C.crypto,
                            bg: C.cryptoBg,
                            info: [
                                "LWE‚ÜíRLWE: pack LWEs into one RLWE, O(n log n) noise",
                                "RLWE‚ÜíRGSW: upgrade a bit so it can drive gates (uses RLev‚Çõ(s¬≤))",
                            ],
                        },
                        {
                            id: "rep",
                            label: "Repacking",
                            sub: "VIA-B",
                            color: C.crypto,
                            bg: C.cryptoBg,
                            info: [
                                "{ RLWE(X·µ¢) } ‚Üí one RLWE,  depth log‚ÇÇ(T¬∑n1/n2)",
                                "reuses the conversion cascade keys (no new offline payload)",
                            ],
                        },
                    ],
                    250,
                    186,
                    78,
                    52,
                    16,
                );
                const msgBoxes = col(
                    [
                        {
                            id: "keys",
                            label: "Public keys",
                            sub: "client ‚Üí server, once",
                            color: C.msg,
                            bg: C.msgBg,
                            info: [
                                "cascade keys @q1, ring-switch key, RLWE‚ÜíRGSW key",
                                "index-independent ‚áí leak nothing about i",
                            ],
                        },
                        {
                            id: "query",
                            label: "Query",
                            sub: "client ‚Üí server",
                            color: C.msg,
                            bg: C.msgBg,
                            info: [
                                "‚âà ‚Ñì¬∑log N elements of Z(q1)  ‚Äî √ï(log N)",
                                "the carrier of privacy",
                            ],
                        },
                        {
                            id: "ans",
                            label: "Answer",
                            sub: "server ‚Üí client",
                            color: C.msg,
                            bg: C.msgBg,
                            info: [
                                "(mask @ q3, body @ q4) over R(n2) ‚Äî ‚âà constant",
                                "VIA-B: T interleaved records",
                            ],
                        },
                    ],
                    490,
                    158,
                    96,
                    52,
                    34,
                );
                const serverBoxes = col(
                    [
                        {
                            id: "qdec",
                            label: "Query decompression",
                            sub: "‚Üí RGSW controls",
                            color: C.server,
                            bg: C.serverBg,
                            info: [
                                "LWE‚ÜíRLWE then RLWE‚ÜíRGSW",
                                "rebuilds C_ctrl, C_sel, C_rot",
                            ],
                        },
                        {
                            id: "dtree",
                            label: "DMux tree",
                            sub: "row select (dim 1)",
                            color: C.server,
                            bg: C.serverBg,
                            info: [
                                "expand log I control bits ‚Üí one-hot over I rows",
                                "+Œ∏_DMux ¬∑ log I",
                            ],
                        },
                        {
                            id: "fdim",
                            label: "First-dimension fold",
                            sub: "Œ£ over rows",
                            color: C.server,
                            bg: C.serverBg,
                            info: [
                                "Œ£_i c_i ¬∑ db[i,j] for each column j",
                                "dominant noise term (~ I¬∑n1¬∑Œ∏¬∑p¬≤/4)",
                            ],
                        },
                        {
                            id: "ctree",
                            label: "CMux tree",
                            sub: "col select (dim 2)",
                            color: C.server,
                            bg: C.serverBg,
                            info: ["select column Œ≤ over J", "+Œ∏_CMux ¬∑ log J"],
                        },
                        {
                            id: "crt",
                            label: "CRot stage",
                            sub: "slot select",
                            color: C.server,
                            bg: C.serverBg,
                            info: ["rotate to expose slot Œ≥", "+Œ∏_crot"],
                        },
                        {
                            id: "rcomp",
                            label: "Response compression",
                            sub: "mod ¬∑ ring ¬∑ rescale",
                            color: C.server,
                            bg: C.serverBg,
                            info: [
                                "mod-switch q2‚Üíq3, ring-switch n1‚Üín2, rescale to q4",
                                "VIA-B repacks first; output must land under Œî/2",
                            ],
                        },
                    ],
                    706,
                    178,
                    78,
                    50,
                    16,
                );
                const nodes = [
                    ...clientBoxes,
                    ...cryptoBoxes,
                    ...msgBoxes,
                    ...serverBoxes,
                ];
                const E = (from, to, label, style, color) => ({
                    from,
                    to,
                    label,
                    style,
                    color,
                });
                const edges = [
                    // client internal + messages
                    E("idx", "qenc", "feeds", "solid", C.client),
                    E("qenc", "query", "creates", "dash", C.msg),
                    E("kgen", "keys", "creates", "dash", C.msg),
                    E("qenc", "conv", "compresses via", "dot", C.crypto),
                    // messages ‚Üí server
                    E("query", "qdec", "input", "solid", C.msg),
                    E("keys", "qdec", "enables", "dot", C.msg),
                    // server pipeline
                    E("qdec", "dtree", "", "solid", C.server),

                                        fontSize: 9,
                                        color: C.dim,
                                        fontFamily: FONT,
                                        letterSpacing: 0.5,
                                    }}
                                >
                                    click for detail
                                </span>
                            </div>
                            {chip !== null && (
                                <div
                                    style={{
                                        marginTop: 12,
                                        border: `1px solid ${CHIPS[chip].col}44`,
                                        background: CHIPS[chip].col + "08",
                                        borderRadius: 8,
                                        padding: "13px 16px",
                                        maxWidth: 820,
                                    }}
                                >
                                    <div
                                        style={{
                                            color: CHIPS[chip].col,
                                            fontWeight: 700,
                                            fontSize: 13,
                                            fontFamily: FONT,
                                            marginBottom: 7,
                                        }}
                                    >
                                        {CHIPS[chip].val} ‚Äî {CHIPS[chip].sub}
                                    </div>
                                    {CHIPS[chip].detail.map((para, i) => (
                                        <p
                                            key={i}
                                            style={{
                                                fontFamily: SANS,
                                                fontSize: 12.5,
                                                color: C.neutral,
                                                lineHeight: 1.55,
                                                margin: "0 0 8px",
                                            }}
                                        >
                                            {para}
                                        </p>
                                    ))}
                                </div>
                            )}
                        </div>
                        <div
                            style={{
                                display: "flex",
                                borderBottom: `1px solid ${C.border}`,
                                borderTop: `1px solid ${C.border}`,
                                background: C.bgAlt,
                                padding: "0 20px",
                                maxWidth: 1000,
                                margin: "0 auto",
                                flexWrap: "wrap",
                            }}
                        >
                            {TABS.map((t, i) => (
                                <button
                                    key={i}
                                    className="tab-btn"
                                    onClick={() => setTab(i)}
                                    style={{
                                        padding: "10px 15px",
                                        color: tab === i ? C.client : C.dimMid,
                                        borderBottom:
                                            tab === i
                                                ? `2px solid ${C.client}`
                                                : "2px solid transparent",
                                        fontSize: 11,
                                        fontFamily: FONT,
                                        fontWeight: tab === i ? 700 : 400,
                                        background: tab === i ? C.bg : "none",
                                    }}
                                >
                                    {t}
                                </button>
                            ))}
                        </div>
                        <div
                            style={{
                                padding: "22px 16px 60px",
                                overflowX: "auto",
                                maxWidth: 1000,
                                margin: "0 auto",
                            }}
                        >
                            <Panel />
                        </div>
                    </div>
                );
            }

            ReactDOM.createRoot(document.getElementById("root")).render(
                <App />,
            );
        </script>
    </body>
</html>
