name: Bench

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Benchmarks (informational; non-blocking) ─────────────────────────────
  # Runs the fast (toy-scale) per-step pipeline benchmarks. On a PR it ALSO
  # benchmarks the base commit (`main`) back-to-back on the same runner and, if
  # any step is > BENCH_REGRESSION_THRESHOLD_PCT slower, posts/updates a sticky
  # PR comment. `continue-on-error` + comment-only keeps it non-blocking — shared
  # runners are noisy, so this is advisory (the conservative threshold + the
  # same-runner compare cut false positives; the authoritative check is the local
  # `just bench-save`/`bench-cmp`). The paper-scale suite runs only on demand via
  # the separate `bench-paper.yml` workflow.
  #
  # This lives in its own workflow (not CI) so it stays out of the required-check
  # path and can fail/skip without touching CI status.
  bench:
    name: Bench (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    # A `permissions:` block REPLACES the default token scopes (unlisted → none),
    # so `contents: read` must be listed explicitly — without it `actions/checkout`
    # can't fetch a private repo and fails with "repository not found".
    permissions:
      contents: read
      pull-requests: write
    env:
      BENCH_REGRESSION_THRESHOLD_PCT: "10"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the base commit to benchmark for the comparison
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # On a PR, benchmark the base commit first (saving a criterion baseline) —
      # but only if it already has the bench target (the PR that *introduces* the
      # benches has no base to compare against → skip gracefully).
      - name: Benchmark base (PR only)
        if: github.event_name == 'pull_request'
        run: |
          BASE='${{ github.event.pull_request.base.sha }}'
          if git cat-file -e "$BASE:crates/via-integration/benches/pipeline_toy.rs" 2>/dev/null; then
            PR_REF="$(git rev-parse HEAD)"
            git checkout --quiet --detach "$BASE"
            cargo bench --bench pipeline_toy -- --save-baseline base
            git checkout --quiet "$PR_REF"
            echo "HAVE_BASE=1" >> "$GITHUB_ENV"
          else
            echo "Base commit lacks the bench target — first-introduction PR; skipping comparison."
            echo "HAVE_BASE=0" >> "$GITHUB_ENV"
          fi

      # Benchmark this branch. With a base baseline available, criterion writes
      # the per-step relative change under target/criterion/<id>/change/.
      - name: Benchmark PR / branch
        run: |
          if [ "${HAVE_BASE:-0}" = "1" ]; then
            cargo bench --bench pipeline_toy -- --baseline base
          else
            cargo bench --bench pipeline_toy
          fi

      # VIA-B batch per-phase bench (informational; the base-baseline +
      # regression-comment logic above is pipeline_toy-specific).
      - name: Benchmark VIA-B batch (toy)
        run: cargo bench --bench pipeline_batch_toy --features via-b

      - name: Detect regressions
        id: regr
        if: github.event_name == 'pull_request' && env.HAVE_BASE == '1'
        run: python3 .github/scripts/bench_regression_comment.py

      # Sticky PR comment: create/update when regressed; otherwise clear an
      # existing one to "resolved". (No comment when there's nothing to say.)
      - name: Comment on PR
        if: github.event_name == 'pull_request' && env.HAVE_BASE == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- via-bench-regression -->';
            const regressed = '${{ steps.regr.outputs.regressed }}' === 'true';
            const body = fs.readFileSync('target/bench_regression_comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (regressed) {
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              }
            } else if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            }
