name: Bench

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Benchmarks (informational; non-blocking) ─────────────────────────────
  # Runs the fast (toy-scale) per-step pipeline benchmarks. On a PR it ALSO
  # benchmarks the base commit (`main`) back-to-back on the same runner and, if
  # any step is > BENCH_REGRESSION_THRESHOLD_PCT slower, posts/updates a sticky
  # PR comment. `continue-on-error` + comment-only keeps it non-blocking — shared
  # runners are noisy, so this is advisory (the conservative threshold + the
  # same-runner compare cut false positives; the authoritative check is the local
  # `just bench-save`/`bench-cmp`). The paper-scale suite runs only on demand via
  # the separate `bench-paper.yml` workflow.
  #
  # This lives in its own workflow (not CI) so it stays out of the required-check
  # path and can fail/skip without touching CI status.
  bench:
    name: Bench (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    # A `permissions:` block REPLACES the default token scopes (unlisted → none),
    # so `contents: read` must be listed explicitly — without it `actions/checkout`
    # can't fetch a private repo and fails with "repository not found".
    permissions:
      contents: read
      pull-requests: write
    env:
      BENCH_REGRESSION_THRESHOLD_PCT: "10"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the base commit to benchmark for the comparison
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # On a PR, benchmark the base commit first (saving a criterion baseline) —
      # but only if it already has the bench target (the PR that *introduces* the
      # benches has no base to compare against → skip gracefully).
      - name: Benchmark base (PR only)
        if: github.event_name == 'pull_request'
        run: |
          BASE='${{ github.event.pull_request.base.sha }}'
          if git cat-file -e "$BASE:crates/via-integration/benches/pipeline_toy.rs" 2>/dev/null; then
            PR_REF="$(git rev-parse HEAD)"
            git checkout --quiet --detach "$BASE"
            # Force a fresh build of the workspace crates under test. A restored
            # target/ cache can otherwise leave the bench binary linked against a
            # stale build, so the comparison measures the wrong code (this guards
            # against the first_dim parallelism regression that slipped through).
            cargo clean -p via-primitives -p via-protocol -p via-client -p via-server -p via-integration
            cargo bench --bench pipeline_toy -- --save-baseline base
            # Also baseline paper/04_first_dim at the asymmetric grid (I=8, J=16),
            # where the parallel fan-out is meant to win — so the comparison and
            # the serial/parallel diagnostic cover both grids. `|| true` keeps a
            # missing/older paper bench from aborting the comparison.
            VIA_BENCH_ROWS=8 VIA_BENCH_COLS=16 cargo bench --bench pipeline_paper -- 04_first_dim --save-baseline base || true
            git checkout --quiet "$PR_REF"
            echo "HAVE_BASE=1" >> "$GITHUB_ENV"
          else
            echo "Base commit lacks the bench target — first-introduction PR; skipping comparison."
            echo "HAVE_BASE=0" >> "$GITHUB_ENV"
          fi

      # Benchmark this branch. With a base baseline available, criterion writes
      # the per-step relative change under target/criterion/<id>/change/.
      # `--baseline-lenient` (not `--baseline`): a bench-id present on this branch
      # but absent from the base — e.g. a step added since `main`, like
      # `toy/04b_prepare_db` — is left uncompared instead of aborting the run with
      # "Baseline 'base' must exist before comparison is allowed".
      - name: Benchmark PR / branch
        run: |
          # Same cache-staleness guard as the base step: rebuild the workspace
          # crates so the bench binary reflects this commit's code, not a stale
          # artifact restored from the target/ cache.
          cargo clean -p via-primitives -p via-protocol -p via-client -p via-server -p via-integration
          # VIA_FIRSTDIM_DEBUG makes first_dim print its chosen path once per
          # process; tee the output so we can surface it below. Bench both the
          # toy grid (expected serial) and paper/04_first_dim at I=8, J=16
          # (expected parallel).
          if [ "${HAVE_BASE:-0}" = "1" ]; then
            VIA_FIRSTDIM_DEBUG=1 cargo bench --bench pipeline_toy -- --baseline-lenient base 2>&1 | tee bench_branch.log
            VIA_FIRSTDIM_DEBUG=1 VIA_BENCH_ROWS=8 VIA_BENCH_COLS=16 cargo bench --bench pipeline_paper -- 04_first_dim --baseline-lenient base 2>&1 | tee -a bench_branch.log
          else
            VIA_FIRSTDIM_DEBUG=1 cargo bench --bench pipeline_toy 2>&1 | tee bench_branch.log
            VIA_FIRSTDIM_DEBUG=1 VIA_BENCH_ROWS=8 VIA_BENCH_COLS=16 cargo bench --bench pipeline_paper -- 04_first_dim 2>&1 | tee -a bench_branch.log
          fi
          echo "::group::first_dim path (serial vs parallel)"
          grep -F '[first_dim]' bench_branch.log || echo "(no [first_dim] debug lines captured)"
          echo "::endgroup::"

      # VIA-B batch per-phase bench (informational; the base-baseline +
      # regression-comment logic above is pipeline_toy-specific).
      - name: Benchmark VIA-B batch (toy)
        run: cargo bench --bench pipeline_batch_toy --features via-b

      - name: Detect regressions
        id: regr
        if: github.event_name == 'pull_request' && env.HAVE_BASE == '1'
        run: python3 .github/scripts/bench_regression_comment.py

      # Sticky PR comment: create/update when regressed; otherwise clear an
      # existing one to "resolved". (No comment when there's nothing to say.)
      - name: Comment on PR
        if: github.event_name == 'pull_request' && env.HAVE_BASE == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- via-bench-regression -->';
            const regressed = '${{ steps.regr.outputs.regressed }}' === 'true';
            const body = fs.readFileSync('target/bench_regression_comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (regressed) {
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              }
            } else if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            }
