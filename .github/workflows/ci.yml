name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── 1. Lint + build ───────────────────────────────────────────────────
  lint-and-build:
    name: Lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --all-targets

  # ─── 2. Test (depends on lint-and-build) ───────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # `--lib --bins --tests` runs unit + integration tests only. NOT
      # `--all-targets`: that also expands to `--benches`, which *runs* every
      # criterion bench once in test mode — including the heavy paper-scale
      # `pipeline_paper` (full n2048 fixture + all steps). Benches are still
      # compile-checked by the lint-and-build job (`build`/`clippy --all-targets`).
      # `#[ignore]`d tests (paper e2e, cascade SPIKE) are skipped by default.
      - name: Unit + integration tests
        run: cargo test --lib --bins --tests

      - name: Doctests
        run: cargo test --doc

  # ─── 3. Docs (rustdoc build + doctests) ────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # `#![deny(rustdoc::broken_intra_doc_links)]` in lib.rs makes this fail
      # the build on any broken intra-doc link. Scoped to via-primitives so the
      # KaTeX rustdocflags (crates/via-primitives/.cargo/config.toml) apply;
      # protocol/client/server docs are added in a later layer.
      # `--features alloc` documents the paper-scale `…_boxed` builders + n2048
      # path (otherwise the by-value gen's intra-doc link to its `…_boxed`
      # sibling, which is alloc-gated, is unresolved and fails the deny lint).
      - name: Build rustdoc (via-primitives)
        run: cargo doc --no-deps --document-private-items --package via-primitives --features alloc

      - name: Doctests (via-primitives)
        run: cargo test --doc --package via-primitives --features alloc

  # Fuzz smoke runs live in their own workflow — see `.github/workflows/fuzz.yml`.

  # ─── 4. no_std compatibility ───────────────────────────────────────────
  no-std:
    name: no_std build
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          # Bare-metal target with neither `std` nor `alloc`. Building here
          # catches any accidental `std::` / `alloc::` import in the crate
          # or its dependency tree.
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2

      - name: Build for thumbv7em-none-eabihf
        run: cargo build --target thumbv7em-none-eabihf --package via-primitives

  # ─── 5. client ⊥ server structural check ─────────────────────────────────
  client-server-isolation:
    name: client ⊥ server (dep isolation)
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # `cargo tree` lists all transitive deps. We detect the forbidden crate's
      # PRESENCE with `grep -q` and fail via `if`. (NB: `grep -qv` is NOT a
      # correct test here — on GNU grep it exits 0 whenever any single line
      # lacks the pattern, which is always true for multi-line tree output, so
      # it would never catch a violation.)
      - name: via-client has no via-server in dep tree
        run: |
          if cargo tree --package via-client 2>&1 | grep -q "via-server"; then
            echo "FAIL: via-client transitively depends on via-server"; exit 1
          fi

      - name: via-server has no via-client in dep tree
        run: |
          if cargo tree --package via-server 2>&1 | grep -q "via-client"; then
            echo "FAIL: via-server transitively depends on via-client"; exit 1
          fi
