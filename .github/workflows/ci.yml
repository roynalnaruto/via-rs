name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── 1. Lint + build ───────────────────────────────────────────────────
  lint-and-build:
    name: Lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --all-targets

  # ─── 2. Test (depends on lint-and-build) ───────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # `--lib --bins --tests` runs unit + integration tests only. NOT
      # `--all-targets`: that also expands to `--benches`, which *runs* every
      # criterion bench once in test mode — including the heavy paper-scale
      # `pipeline_paper` (full n2048 fixture + all steps). Benches are still
      # compile-checked by the lint-and-build job (`build`/`clippy --all-targets`).
      # `#[ignore]`d tests (paper e2e, cascade SPIKE) are skipped by default.
      - name: Unit + integration tests
        run: cargo test --lib --bins --tests

      - name: Doctests
        run: cargo test --doc

  # ─── 3. Docs (rustdoc build + doctests) ────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # `#![deny(rustdoc::broken_intra_doc_links)]` in lib.rs makes this fail
      # the build on any broken intra-doc link. Scoped to via-primitives so the
      # KaTeX rustdocflags (crates/via-primitives/.cargo/config.toml) apply;
      # protocol/client/server docs are added in a later layer.
      # `--features alloc` documents the paper-scale `…_boxed` builders + n2048
      # path (otherwise the by-value gen's intra-doc link to its `…_boxed`
      # sibling, which is alloc-gated, is unresolved and fails the deny lint).
      - name: Build rustdoc (via-primitives)
        run: cargo doc --no-deps --document-private-items --package via-primitives --features alloc

      - name: Doctests (via-primitives)
        run: cargo test --doc --package via-primitives --features alloc

  # Fuzz smoke runs live in their own workflow — see `.github/workflows/fuzz.yml`.

  # ─── 4. no_std compatibility ───────────────────────────────────────────
  no-std:
    name: no_std build
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          # Bare-metal target with neither `std` nor `alloc`. Building here
          # catches any accidental `std::` / `alloc::` import in the crate
          # or its dependency tree.
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2

      - name: Build for thumbv7em-none-eabihf
        run: cargo build --target thumbv7em-none-eabihf --package via-primitives

  # ─── 5. client ⊥ server structural check ─────────────────────────────────
  client-server-isolation:
    name: client ⊥ server (dep isolation)
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # `cargo tree` lists all transitive deps. We detect the forbidden crate's
      # PRESENCE with `grep -q` and fail via `if`. (NB: `grep -qv` is NOT a
      # correct test here — on GNU grep it exits 0 whenever any single line
      # lacks the pattern, which is always true for multi-line tree output, so
      # it would never catch a violation.)
      - name: via-client has no via-server in dep tree
        run: |
          if cargo tree --package via-client 2>&1 | grep -q "via-server"; then
            echo "FAIL: via-client transitively depends on via-server"; exit 1
          fi

      - name: via-server has no via-client in dep tree
        run: |
          if cargo tree --package via-server 2>&1 | grep -q "via-client"; then
            echo "FAIL: via-server transitively depends on via-client"; exit 1
          fi

  # ─── 6. Benchmarks (informational; non-blocking) ──────────────────────────
  # Runs the fast (toy-scale) per-step pipeline benchmarks. On a PR it ALSO
  # benchmarks the base commit (`main`) back-to-back on the same runner and, if
  # any step is > BENCH_REGRESSION_THRESHOLD_PCT slower, posts/updates a sticky
  # PR comment. `continue-on-error` + comment-only keeps it non-blocking — shared
  # runners are noisy, so this is advisory (the conservative threshold + the
  # same-runner compare cut false positives; the authoritative check is the local
  # `just bench-save`/`bench-cmp`). The paper-scale suite runs only on demand via
  # the separate `bench-paper.yml` workflow.
  bench:
    name: Bench (informational)
    runs-on: ubuntu-latest
    needs: lint-and-build
    continue-on-error: true
    permissions:
      pull-requests: write
    env:
      BENCH_REGRESSION_THRESHOLD_PCT: "10"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the base commit to benchmark for the comparison
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # On a PR, benchmark the base commit first (saving a criterion baseline) —
      # but only if it already has the bench target (the PR that *introduces* the
      # benches has no base to compare against → skip gracefully).
      - name: Benchmark base (PR only)
        if: github.event_name == 'pull_request'
        run: |
          BASE='${{ github.event.pull_request.base.sha }}'
          if git cat-file -e "$BASE:crates/via-integration/benches/pipeline_toy.rs" 2>/dev/null; then
            PR_REF="$(git rev-parse HEAD)"
            git checkout --quiet --detach "$BASE"
            cargo bench --bench pipeline_toy -- --save-baseline base
            git checkout --quiet "$PR_REF"
            echo "HAVE_BASE=1" >> "$GITHUB_ENV"
          else
            echo "Base commit lacks the bench target — first-introduction PR; skipping comparison."
            echo "HAVE_BASE=0" >> "$GITHUB_ENV"
          fi

      # Benchmark this branch. With a base baseline available, criterion writes
      # the per-step relative change under target/criterion/<id>/change/.
      - name: Benchmark PR / branch
        run: |
          if [ "${HAVE_BASE:-0}" = "1" ]; then
            cargo bench --bench pipeline_toy -- --baseline base
          else
            cargo bench --bench pipeline_toy
          fi

      - name: Detect regressions
        id: regr
        if: github.event_name == 'pull_request' && env.HAVE_BASE == '1'
        run: python3 .github/scripts/bench_regression_comment.py

      # Sticky PR comment: create/update when regressed; otherwise clear an
      # existing one to "resolved". (No comment when there's nothing to say.)
      - name: Comment on PR
        if: github.event_name == 'pull_request' && env.HAVE_BASE == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- via-bench-regression -->';
            const regressed = '${{ steps.regr.outputs.regressed }}' === 'true';
            const body = fs.readFileSync('target/bench_regression_comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (regressed) {
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              }
            } else if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            }
