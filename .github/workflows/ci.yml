name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── 1. Lint + build ───────────────────────────────────────────────────
  lint-and-build:
    name: Lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --all-targets

  # ─── 2. Test (depends on lint-and-build) ───────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Unit + integration tests
        run: cargo test --all-targets

      - name: Doctests
        run: cargo test --doc

  # ─── 3. Docs (rustdoc build + doctests) ────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # `#![deny(rustdoc::broken_intra_doc_links)]` in lib.rs makes this fail
      # the build on any broken intra-doc link.
      - name: Build rustdoc
        run: cargo doc --no-deps --document-private-items

      - name: Doctests
        run: cargo test --doc

  # Fuzz smoke runs live in their own workflow — see `.github/workflows/fuzz.yml`.

  # ─── 4. no_std compatibility ───────────────────────────────────────────
  no-std:
    name: no_std build
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          # Bare-metal target with neither `std` nor `alloc`. Building here
          # catches any accidental `std::` / `alloc::` import in the crate
          # or its dependency tree.
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2

      - name: Build for thumbv7em-none-eabihf
        run: cargo build --target thumbv7em-none-eabihf
